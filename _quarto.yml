project:
  type: website
  output-dir: _site
  resources:
    - files/**

  render:
    - "*.qmd"
    - "!projects/template.qmd"

website:
  title: "Nathan Onduma"
  site-url: "https://nonduma.github.io/nathan-onduma-site"
  description: "Senior MEL and data science leader working across global health, NTDs, statistics, and data systems in Africa."
  navbar:
    title: "Nathan Onduma"
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "CV"
        href: cv.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "Writing"
        href: writing.qmd
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/nathan-onduma-7a80a0107/
        aria-label: LinkedIn
      - text: "RPubs"
        href: https://rpubs.com/Onduma
  page-footer:
    left: "© Nathan Onduma - work in progress"
    right: "Built with Quarto"

format:
  html:
    theme: cosmo
    css: styles/site.css
    toc: true
    toc-location: right
    code-fold: true
    smooth-scroll: true
    link-external-newwindow: true
    anchor-sections: true

execute:
  echo: false
  warning: false
  message: false
